services:
  10eros-worker:
    image: 10eros-runpod-worker:dev
    pull_policy: never
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - SERVE_API_LOCALLY=true
      # R2 credentials for input download + output upload. Required for any
      # request that includes r2_inputs (every i2v request does).
      # - BUCKET_ENDPOINT_URL=
      # - BUCKET_ACCESS_KEY_ID=
      # - BUCKET_SECRET_ACCESS_KEY=
      # - R2_BUCKET_NAME=
      # - R2_INPUT_BUCKET_NAME=
    ports:
      - "8000:8000"   # RunPod handler
      - "8188:8188"   # ComfyUI UI
    volumes:
      - ./data/comfyui/output:/comfyui/output
      - ./data/runpod-volume:/runpod-volume
